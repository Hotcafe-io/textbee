services:
  # MongoDB service
  textbee-db:
    image: mongo:latest
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-adminUser}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS:-adminPassword}
      - MONGO_INITDB_DATABASE=textbee
    volumes:
      # - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongodb_data:/data/db
    networks:
      - textbee-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # MongoDB Express (optional admin UI) — interno; exponha via dominio se quiser
  mongo-express:
    image: mongo-express:latest
    restart: always
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USER:-adminUser}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASS:-adminPassword}
      - ME_CONFIG_MONGODB_SERVER=textbee-db
    depends_on:
      textbee-db:
        condition: service_healthy
    networks:
      - textbee-network

  # NestJS API
  textbee-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    expose:
      - "3001"
    env_file:
      - path: ./.env
        required: false
    environment:
      - PORT=${PORT:-3001}
      - REDIS_URL=${REDIS_URL:-redis://textbee-redis:6379}
    depends_on:
      textbee-db:
        condition: service_healthy
    networks:
      - textbee-network
      - dokploy-network

  # Next.js Web (+ builda o APK Android no multi-stage e serve em /sms-sender.apk)
  textbee-web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # APK
        API_BASE_URL: ${API_BASE_URL:-https://api.example.com/api/v1/}
        GOOGLE_SERVICES_JSON_B64: ${GOOGLE_SERVICES_JSON_B64:-}
        # Next (fixados em build-time)
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_APK_DOWNLOAD_URL: ${NEXT_PUBLIC_APK_DOWNLOAD_URL:-}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
        NEXT_PUBLIC_LATEST_APP_VERSION_CODE: ${NEXT_PUBLIC_LATEST_APP_VERSION_CODE:-17}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_DISCOUNT_CODE: ${NEXT_PUBLIC_DISCOUNT_CODE:-}
        NEXT_PUBLIC_DISCOUNT_PERCENTAGE: ${NEXT_PUBLIC_DISCOUNT_PERCENTAGE:-}
        NEXT_PUBLIC_SUPPORT_HQ_PROJECT_ID: ${NEXT_PUBLIC_SUPPORT_HQ_PROJECT_ID:-}
        NEXT_PUBLIC_SUPPORT_HQ_THEME_COLOR: ${NEXT_PUBLIC_SUPPORT_HQ_THEME_COLOR:-}
    restart: always
    expose:
      - "3000"
    env_file:
      - path: ./.env
        required: false
    environment:
      - PORT=${PORT:-3000}
    depends_on:
      - textbee-api
    networks:
      - textbee-network
      - dokploy-network

  # Redis (if SMS queue is needed)
  textbee-redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - textbee-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  textbee-network:
    driver: bridge
  # rede do Traefik do Dokploy (criada pelo Dokploy). Local: o service-up.sh
  # cria ela com 'docker network create dokploy-network' antes de subir.
  dokploy-network:
    external: true

volumes:
  mongodb_data:
  redis_data:

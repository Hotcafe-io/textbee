# Override APENAS para desenvolvimento local — expoe as portas no host.
# NAO use no Dokploy/producao (o Traefik roteia pelos dominios via rede interna;
# nao precisa publicar porta). O service-up.sh carrega este arquivo junto:
#   docker compose -f docker-compose.yaml -f docker-compose.local.yml up -d --build
services:
  textbee-web:
    ports:
      - "3000:3000"
  textbee-api:
    ports:
      - "3001:3001"
  mongo-express:
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
  textbee-db:
    ports:
      - "${MONGO_PORT:-27018}:27017"
  textbee-redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"
